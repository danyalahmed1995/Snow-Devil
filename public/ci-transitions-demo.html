<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CI Status Transitions Demo - Snow Devil</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --bg-dark: #0b0f19;
      --bg-card: #111827;
      --border-subtle: #1f2937;
      --text-primary: #f3f4f6;
      --text-secondary: #9ca3af;
      --warning: #eab308;
      --success: #10b981;
      --danger: #ef4444;
      --skipped: #6b7280;
      --font-sans: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-primary);
      font-family: var(--font-sans);
      margin: 0;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
      max-width: 600px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin: 0 0 10px;
      letter-spacing: -0.025em;
    }

    p {
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.5;
      margin: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
      width: 100%;
      max-width: 1200px;
    }

    .card {
      background-color: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      transition: border-color 0.2s;
    }

    .card:hover {
      border-color: #374151;
    }

    .card-number {
      position: absolute;
      top: 12px;
      left: 12px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-secondary);
      background-color: var(--bg-dark);
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid var(--border-subtle);
    }

    .visualizer-box {
      height: 90px;
      width: 100%;
      background-color: var(--bg-dark);
      border-radius: 8px;
      border: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }

    .info {
      text-align: center;
      margin-bottom: 16px;
      width: 100%;
    }

    .title {
      font-size: 15px;
      font-weight: 600;
      margin: 0 0 6px;
    }

    .desc {
      font-size: 12px;
      color: var(--text-secondary);
      margin: 0;
      height: 32px;
      line-height: 1.4;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      width: 100%;
      margin-bottom: 12px;
    }

    .btn {
      flex: 1 1 45%;
      background-color: var(--bg-dark);
      border: 1px solid var(--border-subtle);
      color: var(--text-primary);
      padding: 6px;
      border-radius: 6px;
      font-size: 10px;
      font-family: var(--font-sans);
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .btn-run:hover { background-color: rgba(234, 179, 8, 0.1); border-color: var(--warning); color: var(--warning); }
    .btn-success:hover { background-color: rgba(16, 185, 129, 0.1); border-color: var(--success); color: var(--success); }
    .btn-failure:hover { background-color: rgba(239, 68, 68, 0.1); border-color: var(--danger); color: var(--danger); }
    .btn-skipped:hover { background-color: rgba(107, 114, 128, 0.15); border-color: var(--skipped); color: var(--text-primary); }

    .code-btn {
      width: 100%;
      background-color: transparent;
      border: 1px dashed var(--border-subtle);
      color: var(--text-secondary);
      padding: 6px;
      border-radius: 6px;
      font-size: 10px;
      cursor: pointer;
      font-family: var(--font-mono);
    }
    .code-btn:hover {
      border-color: #4b5563;
      color: var(--text-primary);
    }

    /* --- BASE SPIN STATE (SHARED SYMMETRIC DUAL ARCS) --- */
    .base-spinner {
      position: relative;
      width: 24px;
      height: 24px;
      box-sizing: border-box;
    }

    /* The glowing spinning circle */
    .spinner-ring {
      width: 24px;
      height: 24px;
      border: 2px solid transparent;
      border-left-color: var(--warning);
      border-right-color: var(--warning);
      border-radius: 50%;
      animation: spin 0.8s cubic-bezier(0.5, 0.1, 0.5, 0.9) infinite;
      box-sizing: border-box;
      filter: drop-shadow(0 0 3px var(--warning));
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 1;
      transform: scale(1);
    }

    /* Hidden icons initially */
    .status-icon-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 24px;
      height: 24px;
      opacity: 0;
      transform: scale(0.5) rotate(-45deg);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .success-svg { color: var(--success); filter: drop-shadow(0 0 4px rgba(16, 185, 129, 0.4)); }
    .failure-svg { color: var(--danger); filter: drop-shadow(0 0 4px rgba(239, 68, 68, 0.4)); }
    .skipped-svg { color: var(--skipped); filter: drop-shadow(0 0 4px rgba(107, 114, 128, 0.4)); }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* ==========================================
       10 TRANSITION CONCEPTS
       ========================================== */

    /* --- 1. Fade & Scale Morph --- */
    .t-1.state-success .spinner-ring, .t-1.state-failure .spinner-ring, .t-1.state-skipped .spinner-ring {
      opacity: 0;
      transform: scale(0.6);
    }
    .t-1.state-success .success-svg, .t-1.state-failure .failure-svg, .t-1.state-skipped .skipped-svg {
      opacity: 1;
      transform: scale(1) rotate(0deg);
    }

    /* --- 2. Spin Freeze & Fill --- */
    .t-2.state-success .spinner-ring {
      animation: none;
      border-color: var(--success);
      background-color: rgba(16, 185, 129, 0.1);
      filter: drop-shadow(0 0 4px var(--success));
      transform: rotate(180deg);
    }
    .t-2.state-failure .spinner-ring {
      animation: none;
      border-color: var(--danger);
      background-color: rgba(239, 68, 68, 0.1);
      filter: drop-shadow(0 0 4px var(--danger));
      transform: rotate(180deg);
    }
    .t-2.state-skipped .spinner-ring {
      animation: none;
      border-color: var(--skipped);
      background-color: rgba(107, 114, 128, 0.1);
      filter: drop-shadow(0 0 4px var(--skipped));
      transform: rotate(180deg);
    }
    .t-2.state-success .success-svg, .t-2.state-failure .failure-svg, .t-2.state-skipped .skipped-svg {
      opacity: 1;
      transform: scale(0.8) rotate(0deg);
    }

    /* --- 3. Elastic Bounce Reveal --- */
    .t-3.state-success .spinner-ring, .t-3.state-failure .spinner-ring, .t-3.state-skipped .spinner-ring {
      opacity: 0;
      transform: scale(0);
      transition: all 0.3s cubic-bezier(0.6, -0.28, 0.735, 0.045);
    }
    .t-3.state-success .success-svg { animation: elastic-bounce 0.5s forwards 0.15s; }
    .t-3.state-failure .failure-svg { animation: elastic-bounce 0.5s forwards 0.15s; }
    .t-3.state-skipped .skipped-svg { animation: elastic-bounce 0.5s forwards 0.15s; }
    @keyframes elastic-bounce {
      0% { transform: scale(0) rotate(-45deg); opacity: 0; }
      70% { transform: scale(1.2) rotate(10deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    /* --- 4. Ripple Dissolve --- */
    .t-4.state-success .spinner-ring, .t-4.state-failure .spinner-ring, .t-4.state-skipped .spinner-ring {
      animation: ripple-out 0.4s forwards;
    }
    .t-4.state-success .success-svg, .t-4.state-failure .failure-svg, .t-4.state-skipped .skipped-svg {
      opacity: 1;
      transform: scale(1) rotate(0deg);
      transition-delay: 0.1s;
    }
    @keyframes ripple-out {
      0% { transform: scale(1); opacity: 1; border-color: var(--warning); }
      50% { border-color: currentColor; }
      100% { transform: scale(1.8); opacity: 0; border-width: 0.5px; }
    }

    /* --- 5. Rotate & Slam --- */
    .t-5.state-success .spinner-ring, .t-5.state-failure .spinner-ring, .t-5.state-skipped .spinner-ring {
      animation: spin-fast-stop 0.3s forwards;
    }
    .t-5.state-success .success-svg, .t-5.state-failure .failure-svg, .t-5.state-skipped .skipped-svg {
      opacity: 1;
      transform: scale(1) rotate(0deg);
      animation: slam-bounce 0.4s forwards 0.2s;
    }
    @keyframes spin-fast-stop {
      0% { transform: rotate(0deg) scale(1); opacity: 1; }
      100% { transform: rotate(720deg) scale(0.4); opacity: 0; }
    }
    @keyframes slam-bounce {
      0% { transform: scale(3); opacity: 0; filter: blur(4px); }
      70% { transform: scale(0.9); opacity: 1; filter: blur(0); }
      100% { transform: scale(1); opacity: 1; }
    }

    /* --- 6. Conic Wipe --- */
    .t-6.state-success .spinner-ring {
      animation: none;
      border-color: var(--success);
      background: conic-gradient(var(--success) 0%, transparent 100%);
      opacity: 0;
    }
    .t-6.state-failure .spinner-ring {
      animation: none;
      border-color: var(--danger);
      background: conic-gradient(var(--danger) 0%, transparent 100%);
      opacity: 0;
    }
    .t-6.state-skipped .spinner-ring {
      animation: none;
      border-color: var(--skipped);
      background: conic-gradient(var(--skipped) 0%, transparent 100%);
      opacity: 0;
    }
    .t-6.state-success .success-svg, .t-6.state-failure .failure-svg, .t-6.state-skipped .skipped-svg {
      opacity: 1;
      transform: scale(1) rotate(0deg);
    }

    /* --- 7. Split Dash Collapse --- */
    .t-7.state-success .spinner-ring { animation: collapse-ring-success 0.4s forwards; }
    .t-7.state-failure .spinner-ring { animation: collapse-ring-failure 0.4s forwards; }
    .t-7.state-skipped .spinner-ring { animation: collapse-ring-skipped 0.4s forwards; }
    .t-7.state-success .success-svg, .t-7.state-failure .failure-svg, .t-7.state-skipped .skipped-svg {
      opacity: 1;
      transform: scale(1) rotate(0deg);
      transition-delay: 0.25s;
    }
    @keyframes collapse-ring-success {
      0% { border-left-color: var(--warning); border-right-color: var(--warning); transform: rotate(0); }
      50% { border-color: var(--success); border-width: 4px; transform: scale(0.8); }
      100% { border-color: transparent; border-width: 0px; transform: scale(0.2); }
    }
    @keyframes collapse-ring-failure {
      0% { border-left-color: var(--warning); border-right-color: var(--warning); transform: rotate(0); }
      50% { border-color: var(--danger); border-width: 4px; transform: scale(0.8); }
      100% { border-color: transparent; border-width: 0px; transform: scale(0.2); }
    }
    @keyframes collapse-ring-skipped {
      0% { border-left-color: var(--warning); border-right-color: var(--warning); transform: rotate(0); }
      50% { border-color: var(--skipped); border-width: 4px; transform: scale(0.8); }
      100% { border-color: transparent; border-width: 0px; transform: scale(0.2); }
    }

    /* --- 8. Holographic Glitch --- */
    .t-8.state-success .spinner-ring, .t-8.state-failure .spinner-ring, .t-8.state-skipped .spinner-ring {
      animation: glitch-flash 0.35s step-end forwards;
    }
    .t-8.state-success .success-svg, .t-8.state-failure .failure-svg, .t-8.state-skipped .skipped-svg {
      opacity: 1;
      transform: scale(1) rotate(0deg);
      animation: glitch-flash-svg 0.4s ease-out forwards;
    }
    @keyframes glitch-flash {
      0% { opacity: 1; filter: invert(0); }
      20% { opacity: 0.2; }
      40% { opacity: 0.8; filter: hue-rotate(90deg); }
      100% { opacity: 0; }
    }
    @keyframes glitch-flash-svg {
      0% { opacity: 0; transform: scale(0.8) skewX(20deg); }
      30% { opacity: 0.7; transform: scale(1.1) skewX(-20deg); }
      60% { opacity: 1; transform: scale(0.9) skewX(0deg); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* --- 9. Concentric Merge --- */
    .t-9.state-success .spinner-ring, .t-9.state-failure .spinner-ring, .t-9.state-skipped .spinner-ring {
      animation: merge-contract 0.3s cubic-bezier(0.55, 0.085, 0.68, 0.53) forwards;
    }
    .t-9.state-success .success-svg, .t-9.state-failure .failure-svg, .t-9.state-skipped .skipped-svg {
      opacity: 1;
      transform: scale(1) rotate(0deg);
      transition-delay: 0.15s;
    }
    @keyframes merge-contract {
      0% { transform: scale(1) rotate(0); border-width: 2px; }
      100% { transform: scale(0) rotate(360deg); border-width: 6px; border-color: currentColor; }
    }

    /* --- 10. Shutter Flip --- */
    .t-10.state-success .spinner-ring, .t-10.state-failure .spinner-ring, .t-10.state-skipped .spinner-ring {
      transform: rotateY(90deg);
      opacity: 0;
      transition: all 0.3s ease-in;
    }
    .t-10.state-success .success-svg, .t-10.state-failure .failure-svg, .t-10.state-skipped .skipped-svg {
      opacity: 1;
      transform: scale(1) rotateY(0deg);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      transition-delay: 0.2s;
    }
  </style>
</head>
<body>

  <header>
    <h1>CI Status Transitions Demo</h1>
    <p>10 clean, high-performance CSS transition models showing step states converting from running (glowing Symmetric Dual Arcs) to completed (Success, Failure, or Skipped).</p>
  </header>

  <div class="grid">
    
    <!-- Generate 10 identical structural cards with JS handlers -->
    <script>
      const titles = [
        "Fade & Scale Morph", "Spin Freeze & Fill", "Elastic Bounce Reveal", 
        "Ripple Dissolve", "Rotate & Slam", "Conic Wipe", 
        "Split Dash Collapse", "Holographic Glitch", "Concentric Merge", "Shutter 3D Flip"
      ];
      
      const descs = [
        "A clean crossfade where the spinning arcs shrink away as the check/cross/dash elastically rotates in.",
        "The spinner stops instantly, morphs color, and fills in to frame the completed state icon.",
        "Arcs shrink to zero, followed by a playful, elastic bouncy pop-in of the status icon.",
        "The yellow arcs trigger an expanding soundwave ripple effect and dissolve as the icon fades in.",
        "Arcs accelerate into a fast spin and slam-implode as the target icon drops in from above.",
        "A clean circular wipe sweeps away the yellow arcs and paints the completed status.",
        "The yellow arcs thicken, lock in vertical alignment, and collapse into the center.",
        "A fast, high-tech matrix pixel flicker swaps the loader out for the completed check/cross/dash.",
        "The outer yellow arcs collapse inward, merging directly into the shape of the status icon.",
        "The spinner flips 90 degrees on the Y-axis to vanish, and the status icon flips in elastically."
      ];

      for (let i = 1; i <= 10; i++) {
        document.write(`
          <div class="card t-${i}">
            <span class="card-number">${String(i).padStart(2, '0')}</span>
            <div class="visualizer-box">
              <div class="base-spinner">

                <!-- Success: CheckCircle2 -->
                <svg class="status-icon-svg success-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="m9 12 2 2 4-4"></path></svg>
                <!-- Failure: XCircle -->
                <svg class="status-icon-svg failure-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="m15 9-6 6"></path><path d="m9 9 6 6"></path></svg>
                <!-- Skipped: MinusCircle -->
                <svg class="status-icon-svg skipped-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="8" y1="12" x2="16" y2="12"></line></svg>
              </div>
            </div>
            <div class="info">
              <h3 class="title">${titles[i-1]}</h3>
              <p class="desc">${descs[i-1]}</p>
            </div>
            <div class="controls">
              <button class="btn btn-run" onclick="resetSpinner(${i})">Running</button>
              <button class="btn btn-success" onclick="triggerState(${i}, 'success')">Success</button>
              <button class="btn btn-failure" onclick="triggerState(${i}, 'failure')">Failure</button>
              <button class="btn btn-skipped" onclick="triggerState(${i}, 'skipped')">Skipped</button>
            </div>
            <button class="code-btn" onclick="copyCode(${i})">Copy CSS Code</button>
          </div>
        `);
      }
    </script>

  </div>

}
@keyframes glitch-flash-svg {
  0% { opacity: 0; transform: scale(0.8) skewX(20deg); }
  100% { opacity: 1; transform: scale(1); }
}`,
      9: `/* Concentric Merge */
.state-success .spinner-ring, .state-failure .spinner-ring, .state-skipped .spinner-ring {
  animation: merge-contract 0.3s forwards;
}
.state-success .success-svg, .state-failure .failure-svg, .state-skipped .skipped-svg {
  opacity: 1; transform: scale(1) rotate(0deg); transition-delay: 0.15s;
}
@keyframes merge-contract {
  100% { transform: scale(0) rotate(360deg); border-width: 6px; }
}`,
      10: `/* Shutter Flip */
.state-success .spinner-ring, .state-failure .spinner-ring, .state-skipped .spinner-ring {
  transform: rotateY(90deg); opacity: 0; transition: all 0.3s ease-in;
}
.state-success .success-svg, .state-failure .failure-svg, .state-skipped .skipped-svg {
  opacity: 1; transform: scale(1) rotateY(0deg); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); transition-delay: 0.2s;
}`
    };

    function triggerState(id, state) {
      const card = document.querySelector(`.t-${id}`);
      card.classList.remove('state-success', 'state-failure', 'state-skipped');
      
      setTimeout(() => {
        card.classList.add(`state-${state}`);
      }, 30);
    }

    function resetSpinner(id) {
      const card = document.querySelector(`.t-${id}`);
      card.classList.remove('state-success', 'state-failure', 'state-skipped');
    }

    function copyCode(id) {
      const cssText = codeTemplates[id];
      navigator.clipboard.writeText(cssText).then(() => {
        const btn = document.querySelectorAll('.code-btn')[id - 1];
        const oldText = btn.textContent;
        btn.textContent = 'Copied to Clipboard!';
        btn.style.borderColor = '#10b981';
        btn.style.color = '#10b981';
        setTimeout(() => {
          btn.textContent = oldText;
          btn.style.borderColor = '';
          btn.style.color = '';
        }, 1500);
      });
    }
  </script>
</body>
</html>
