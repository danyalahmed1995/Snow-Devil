<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Architecture Tab Designs & Icons</title>
  <link rel="stylesheet" href="architecture-tab-designs.css">
  <!-- Load Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      padding: 40px;
      margin: 0;
    }
    .controls {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }
    .controls div {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    select {
      padding: 8px;
      font-size: 16px;
      background: #21262d;
      color: white;
      border: 1px solid #30363d;
      border-radius: 6px;
    }
    
    /* Base Inspector Styles from the App */
    .inspector-sidebar {
      width: 320px;
      height: 200px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 16px;
    }
    .inspector-tabs {
      display: flex;
      margin: 12px 0 0;
      padding: 4px;
      border-radius: 6px;
      background: rgba(0,0,0,0.25);
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.4);
    }
    .inspector-tabs button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      flex: 1;
      min-height: 30px;
      padding: 0 16px;
      border: none;
      border-radius: 4px;
      color: #8b949e;
      font-size: 11px;
      font-weight: 600;
      background: transparent;
      cursor: pointer;
    }
    /* The default active state before a theme is applied */
    .inspector-tabs button.is-active {
      color: #fff;
      background: #0070f3; /* Default App Accent */
    }
    .icon-container svg {
      width: 14px;
      height: 14px;
    }
  </style>
</head>
<body>
  <div class="controls">
    <div>
      <label for="theme-select"><strong>Select Button Theme:</strong></label>
      <select id="theme-select">
        <option value="">Default (App Original)</option>
        <option value="theme-neon-cyan">1. Neon Cyan Glow</option>
        <option value="theme-glass">2. Glassmorphism Frosted</option>
        <option value="theme-navy">3. Deep Navy Professional</option>
        <option value="theme-terminal">4. Hacker Terminal</option>
        <option value="theme-cyberpunk">5. Cyberpunk Edge</option>
        <option value="theme-obsidian">6. Polished Obsidian</option>
        <option value="theme-purple">7. Ethereal Purple (Pill)</option>
        <option value="theme-frost">8. Minimalist Frost</option>
        <option value="theme-crimson">9. Crimson Forge</option>
        <option value="theme-holographic">10. Holographic Projection</option>
      </select>
    </div>
    
    <div>
      <label for="icon-select"><strong>Select Icon:</strong></label>
      <select id="icon-select">
        <option value="network">1. Network (Current)</option>
        <option value="boxes">2. Boxes</option>
        <option value="component">3. Component</option>
        <option value="database">4. Database</option>
        <option value="layers">5. Layers</option>
        <option value="workflow">6. Workflow</option>
        <option value="map">7. Map</option>
        <option value="cpu">8. Cpu</option>
        <option value="grid">9. Grid</option>
        <option value="git-merge">10. Git Merge</option>
      </select>
    </div>
  </div>

  <div id="preview-container" class="theme-container">
    <div class="inspector-sidebar">
      <div style="font-size: 11px; font-weight: bold; color: #8b949e; margin-bottom: 10px;">INSPECTOR</div>
      <div class="inspector-tabs" role="tablist">
        <!-- We only show one tab since we're focusing on the Architecture button -->
        <button role="tab" class="is-active">
          <span class="icon-container" id="icon-render"><i data-lucide="network"></i></span>
          Architecture
        </button>
      </div>
    </div>
  </div>

  <script>
    // Initialize Lucide icons
    lucide.createIcons();

    // Theme Switcher
    const themeSelect = document.getElementById('theme-select');
    const container = document.getElementById('preview-container');
    themeSelect.addEventListener('change', (e) => {
      container.className = 'theme-container ' + e.target.value;
    });

    // Icon Switcher
    const iconSelect = document.getElementById('icon-select');
    const iconRender = document.getElementById('icon-render');
    iconSelect.addEventListener('change', (e) => {
      iconRender.innerHTML = `<i data-lucide="${e.target.value}"></i>`;
      lucide.createIcons();
    });
  </script>
</body>
</html>
