<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Design Previewer</title>
  <link id="theme-link" rel="stylesheet" href="/design1.css">
  <style>
    body {
      background: #000;
      color: #fff;
      font-family: sans-serif;
      padding: 40px;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      background: #111;
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #333;
    }
    button {
      padding: 8px 16px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    
    /* Mock styles for the base diff structure to make the preview work standalone */
    .diff-file { margin-bottom: 10px; overflow: hidden; border: 1px solid #333; border-radius: 6px; background: #070c12; }
    .diff-file>header { height: 34px; display: flex; align-items: center; justify-content: space-between; padding: 0 10px; background: #111; font-size: 10px; }
    .diff-file table { width: 100%; border-collapse: collapse; table-layout: fixed; font: 11px ui-monospace, SFMono-Regular, Consolas, monospace; }
    .diff-split td { width: 50%; padding: 0; vertical-align: top; }
    .diff-split-cell { display: flex; min-height: 100%; }
    .diff-split td span { flex: 0 0 42px; padding: 0 7px; text-align: right; user-select: none; }
    .diff-split td code { flex: 1; min-width: 0; padding: 0 8px; white-space: pre-wrap; overflow-wrap: anywhere; display: block; }
  </style>
</head>
<body>

  <div class="controls">
    <strong>Select Design:</strong>
    <select id="theme-select" onchange="document.getElementById('theme-link').href = '/' + this.value + '.css'">
      <option value="design1">Design 1: Glassmorphism</option>
      <option value="design2">Design 2: High Contrast Minimalist</option>
      <option value="design3">Design 3: Nord Theme</option>
      <option value="design4">Design 4: Dracula Theme</option>
      <option value="design5">Design 5: Monokai Pro</option>
      <option value="design6">Design 6: Cyberpunk Neon</option>
      <option value="design7">Design 7: Soft Rounded / Apple</option>
      <option value="design8">Design 8: Material Dark</option>
      <option value="design9">Design 9: Zebra Striped</option>
      <option value="design10">Design 10: Outlined / Wireframe</option>
    </select>
  </div>

  <section class="diff-file">
    <header>
      <span><strong>src/components/CoolComponent.tsx</strong></span>
      <div>
        <button>Open source</button>
        <button>Viewed</button>
        <b>+2</b><i>-1</i>
      </div>
    </header>
    <table class="diff-split">
      <tbody>
        <!-- Unchanged row -->
        <tr>
          <td><div class="diff-split-cell"><span>12</span><code><span class="syntax-keyword">function</span> calculateLayout() {</code></div></td>
          <td><div class="diff-split-cell"><span>12</span><code><span class="syntax-keyword">function</span> calculateLayout() {</code></div></td>
        </tr>
        <!-- Removed row -->
        <tr>
          <td class="is-remove"><div class="diff-split-cell"><span>13</span><code>  <span class="syntax-keyword">const</span> oldVar = <span class="syntax-number">42</span>;</code></div></td>
          <td><div class="diff-split-cell"><span></span><code></code></div></td>
        </tr>
        <!-- Added row -->
        <tr>
          <td><div class="diff-split-cell"><span></span><code></code></div></td>
          <td class="is-add"><div class="diff-split-cell"><span>13</span><code>  <span class="syntax-keyword">const</span> newVar = <span class="syntax-number">100</span>;</code></div></td>
        </tr>
        <!-- Added row -->
        <tr>
          <td><div class="diff-split-cell"><span></span><code></code></div></td>
          <td class="is-add"><div class="diff-split-cell"><span>14</span><code>  <span class="syntax-keyword">return</span> newVar + <span class="syntax-string">" pixels"</span>;</code></div></td>
        </tr>
        <!-- Unchanged row -->
        <tr>
          <td><div class="diff-split-cell"><span>14</span><code>}</code></div></td>
          <td><div class="diff-split-cell"><span>15</span><code>}</code></div></td>
        </tr>
      </tbody>
    </table>
  </section>

</body>
</html>
