<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Component Map Toolbar Designs</title>
  <link rel="stylesheet" href="map-toolbar-designs.css">
  <style>
    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      padding: 40px;
      margin: 0;
    }
    .theme-selector {
      margin-bottom: 30px;
    }
    .theme-selector select {
      padding: 8px;
      font-size: 16px;
      background: #21262d;
      color: white;
      border: 1px solid #30363d;
      border-radius: 6px;
    }
    
    /* Base structure mirroring the app's CSS */
    .full-component-map {
      display: flex;
      flex-direction: column;
      border: 1px solid #30363d;
      border-radius: 8px;
      background: #0d1117;
      overflow: hidden;
      min-height: 200px;
    }
    .full-component-map__toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 15px;
      padding: 8px 12px;
      border-bottom: 1px solid #30363d;
      background: rgba(0,0,0,.2);
    }
    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toolbar-group button {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 8px;
      border-radius: 4px;
      color: #8b949e;
      font-size: 11px;
      background: rgba(255,255,255,.05);
      border: 1px solid transparent;
      cursor: pointer;
    }
    .toolbar-group button:hover {
      background: rgba(255,255,255,.1);
      color: #c9d1d9;
    }
    .toolbar-group label {
      display: flex;
      align-items: center;
      gap: 4px;
      color: #8b949e;
      font-size: 11px;
      cursor: pointer;
    }
    .toolbar-group select {
      background: rgba(255,255,255,.05);
      color: #c9d1d9;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 4px;
      font-size: 11px;
      outline: none;
      cursor: pointer;
    }
    .toolbar-search {
      flex: 1;
      min-width: 150px;
      position: relative;
    }
    .toolbar-search input {
      width: 100%;
      padding: 4px 8px 4px 24px;
      border-radius: 4px;
      background: rgba(255,255,255,.05);
      border: 1px solid #30363d;
      color: #c9d1d9;
      font-size: 11px;
      outline: none;
      box-sizing: border-box;
    }
    .toolbar-search input:focus {
      border-color: #58a6ff;
    }
    .toolbar-icon {
      position: absolute;
      left: 6px;
      top: 50%;
      transform: translateY(-50%);
      color: #8b949e;
      font-size: 10px;
    }
  </style>
</head>
<body>
  <div class="theme-selector">
    <label for="theme-select"><strong>Select Toolbar Theme:</strong> </label>
    <select id="theme-select">
      <option value="">Default (None)</option>
      <option value="theme-neon-cyan">1. Neon Cyan Glow</option>
      <option value="theme-glass">2. Glassmorphism Frosted</option>
      <option value="theme-navy">3. Deep Navy Professional</option>
      <option value="theme-terminal">4. Hacker Terminal</option>
      <option value="theme-cyberpunk">5. Cyberpunk Edge</option>
      <option value="theme-obsidian">6. Polished Obsidian</option>
      <option value="theme-purple">7. Ethereal Purple (Pill)</option>
      <option value="theme-frost">8. Minimalist Frost</option>
      <option value="theme-crimson">9. Crimson Forge</option>
      <option value="theme-holographic">10. Holographic Projection</option>
    </select>
  </div>

  <div id="preview-container" class="theme-container">
    <div class="full-component-map">
      <!-- THE TOOLBAR -->
      <div class="full-component-map__toolbar">
        <div class="toolbar-group">
          <button>🔍 Fit</button>
          <button>🎯 Focus</button>
          <button>🔄 Reset</button>
          <button>⛶ Full Screen</button>
        </div>
        
        <div class="toolbar-group">
          <label><input type="checkbox" checked> Dependencies</label>
          <label><input type="checkbox" checked> Dependents</label>
          <label><input type="checkbox" checked> Indirect</label>
        </div>

        <div class="toolbar-group">
          <!-- The Select / Sub Menu -->
          <select>
            <option value="subsystem">Group by Subsystem</option>
            <option value="root">Group by Root Path</option>
            <option value="package">Group by Package</option>
            <option value="kind">Group by Kind</option>
            <option value="none">No Grouping</option>
          </select>
        </div>

        <div class="toolbar-search">
          <span class="toolbar-icon">🔎</span>
          <input type="text" placeholder="Search components...">
        </div>
      </div>
      <!-- End Toolbar -->
      
      <div style="padding: 40px; text-align: center; color: #8b949e;">
        [ Component Map Canvas Below ]
      </div>
    </div>
  </div>

  <script>
    const select = document.getElementById('theme-select');
    const container = document.getElementById('preview-container');
    select.addEventListener('change', (e) => {
      // Keep base class and add the theme
      container.className = 'theme-container ' + e.target.value;
    });
  </script>
</body>
</html>
