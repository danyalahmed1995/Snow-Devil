<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Branch Status Transitions Demo - Snow Devil</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --bg-dark: #0b0f19;
      --bg-card: #111827;
      --border-subtle: #1f2937;
      --text-primary: #f3f4f6;
      --text-secondary: #9ca3af;
      
      /* Colors & Glows */
      --yellow: #eab308;
      --yellow-glow: rgba(234, 179, 8, 0.25);
      
      --green: #10b981;
      --green-glow: rgba(16, 185, 129, 0.25);
      
      --red: #ef4444;
      --red-glow: rgba(239, 68, 68, 0.25);
      
      --purple: #a371f7;
      --purple-glow: rgba(163, 113, 247, 0.25);
      
      --grey: #6b7280;
      --grey-glow: rgba(107, 114, 128, 0.15);

      --font-sans: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-primary);
      font-family: var(--font-sans);
      margin: 0;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
      max-width: 600px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin: 0 0 10px;
      letter-spacing: -0.025em;
    }

    p {
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.5;
      margin: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
      width: 100%;
      max-width: 1200px;
    }

    .card {
      background-color: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      transition: border-color 0.2s;
    }

    .card:hover {
      border-color: #374151;
    }

    .card-number {
      position: absolute;
      top: 12px;
      left: 12px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-secondary);
      background-color: var(--bg-dark);
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid var(--border-subtle);
    }

    .visualizer-box {
      height: 90px;
      width: 100%;
      background-color: var(--bg-dark);
      border-radius: 8px;
      border: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .info {
      text-align: center;
      margin-bottom: 16px;
      width: 100%;
    }

    .title {
      font-size: 15px;
      font-weight: 600;
      margin: 0 0 6px;
    }

    .desc {
      font-size: 12px;
      color: var(--text-secondary);
      margin: 0;
      height: 32px;
      line-height: 1.4;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      width: 100%;
      margin-bottom: 12px;
    }

    .btn {
      flex: 1 1 30%;
      background-color: var(--bg-dark);
      border: 1px solid var(--border-subtle);
      color: var(--text-primary);
      padding: 6px;
      border-radius: 6px;
      font-size: 10px;
      font-family: var(--font-sans);
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .btn-running:hover { background-color: rgba(234, 179, 8, 0.1); border-color: var(--yellow); color: var(--yellow); }
    .btn-success:hover { background-color: rgba(16, 185, 129, 0.1); border-color: var(--green); color: var(--green); }
    .btn-failure:hover { background-color: rgba(239, 68, 68, 0.1); border-color: var(--red); color: var(--red); }
    .btn-merged:hover { background-color: rgba(163, 113, 247, 0.1); border-color: var(--purple); color: var(--purple); }
    .btn-skipped:hover { background-color: rgba(107, 114, 128, 0.15); border-color: var(--grey); color: var(--text-primary); }

    .code-btn {
      width: 100%;
      background-color: transparent;
      border: 1px dashed var(--border-subtle);
      color: var(--text-secondary);
      padding: 6px;
      border-radius: 6px;
      font-size: 10px;
      cursor: pointer;
      font-family: var(--font-mono);
    }
    .code-btn:hover {
      border-color: #4b5563;
      color: var(--text-primary);
    }

    /* --- BASE BRANCH TAG DESIGN --- */
    .branch-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 6px;
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 500;
      border: 1px solid var(--border-subtle);
      background-color: rgba(255,255,255,0.02);
      color: var(--text-secondary);
      position: relative;
      box-sizing: border-box;
      transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    .branch-icon {
      width: 12px;
      height: 12px;
      transition: all 0.4s ease;
      color: currentColor;
    }

    .branch-icon-merge { display: none; }
    .branch-icon-branch { display: block; }

    /* STATE: DEFAULT RUNNING */
    .state-running .branch-tag {
      color: var(--yellow);
      border-color: var(--yellow);
      background-color: rgba(234, 179, 8, 0.04);
      box-shadow: 0 0 10px var(--yellow-glow);
    }

    /* STATE: SUCCESS */
    .state-success .branch-tag {
      color: var(--green);
      border-color: var(--green);
      background-color: rgba(16, 185, 129, 0.04);
      box-shadow: 0 0 12px var(--green-glow);
    }

    /* STATE: FAILURE */
    .state-failure .branch-tag {
      color: var(--red);
      border-color: var(--red);
      background-color: rgba(239, 68, 68, 0.04);
      box-shadow: 0 0 12px var(--red-glow);
    }

    /* STATE: MERGED */
    .state-merged .branch-tag {
      color: var(--purple);
      border-color: var(--purple);
      background-color: rgba(163, 113, 247, 0.04);
      box-shadow: 0 0 12px var(--purple-glow);
    }
    .state-merged .branch-icon-branch { display: none; }
    .state-merged .branch-icon-merge { display: block; }

    /* STATE: SKIPPED */
    .state-skipped .branch-tag {
      color: var(--text-secondary);
      border-color: var(--grey);
      background-color: rgba(107, 114, 128, 0.04);
      box-shadow: 0 0 8px var(--grey-glow);
    }

    /* ==================================================
       10 BRANCH TRANSITION ANIMATIONS (ON THE TAG)
       ================================================== */

    /* --- 1. Glow Pulse Morph (Dynamic Scale & Glow) --- */
    .t-1.state-success .branch-tag { animation: pulse-green 0.5s ease-out; }
    .t-1.state-failure .branch-tag { animation: pulse-red 0.5s ease-out; }
    .t-1.state-merged .branch-tag { animation: pulse-purple 0.5s ease-out; }
    .t-1.state-skipped .branch-tag { animation: pulse-grey 0.5s ease-out; }
    @keyframes pulse-green {
      0% { box-shadow: 0 0 4px var(--yellow-glow); }
      50% { box-shadow: 0 0 24px var(--green-glow); transform: scale(1.05); }
      100% { box-shadow: 0 0 12px var(--green-glow); }
    }
    @keyframes pulse-red {
      0% { box-shadow: 0 0 4px var(--yellow-glow); }
      50% { box-shadow: 0 0 24px var(--red-glow); transform: scale(1.05); }
      100% { box-shadow: 0 0 12px var(--red-glow); }
    }
    @keyframes pulse-purple {
      0% { box-shadow: 0 0 4px var(--yellow-glow); }
      50% { box-shadow: 0 0 24px var(--purple-glow); transform: scale(1.05); }
      100% { box-shadow: 0 0 12px var(--purple-glow); }
    }
    @keyframes pulse-grey {
      0% { box-shadow: 0 0 4px var(--yellow-glow); }
      50% { box-shadow: 0 0 16px var(--grey-glow); transform: scale(1.03); }
      100% { box-shadow: 0 0 8px var(--grey-glow); }
    }

    /* --- 2. Elastic Width Snap --- */
    .t-2.state-success .branch-tag, .t-2.state-failure .branch-tag, 
    .t-2.state-merged .branch-tag, .t-2.state-skipped .branch-tag {
      animation: elastic-snap 0.5s cubic-bezier(0.25, 1.5, 0.5, 1);
    }
    @keyframes elastic-snap {
      0% { transform: scaleX(0.7) scaleY(1); opacity: 0.8; }
      50% { transform: scaleX(1.1) scaleY(0.9); }
      100% { transform: scaleX(1) scaleY(1); opacity: 1; }
    }

    /* --- 3. Double Line Shutter --- */
    .t-3 .branch-tag::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      border: 1px solid transparent;
      border-radius: 6px;
      transition: all 0.4s ease;
    }
    .t-3.state-success .branch-tag::before { border-color: var(--green); transform: scale(1.2); opacity: 0; }
    .t-3.state-failure .branch-tag::before { border-color: var(--red); transform: scale(1.2); opacity: 0; }
    .t-3.state-merged .branch-tag::before { border-color: var(--purple); transform: scale(1.2); opacity: 0; }
    .t-3.state-skipped .branch-tag::before { border-color: var(--grey); transform: scale(1.1); opacity: 0; }

    /* --- 4. Holographic Glitch --- */
    .t-4.state-success .branch-tag { animation: glitch-flash 0.35s forwards; }
    .t-4.state-failure .branch-tag { animation: glitch-flash 0.35s forwards; }
    .t-4.state-merged .branch-tag { animation: glitch-flash 0.35s forwards; }
    .t-4.state-skipped .branch-tag { animation: glitch-flash 0.35s forwards; }
    @keyframes glitch-flash {
      0% { opacity: 1; transform: skewX(-15deg); filter: hue-rotate(90deg); }
      30% { transform: skewX(15deg); filter: invert(0.2); }
      60% { transform: skewX(-5deg); }
      100% { opacity: 1; transform: skewX(0); }
    }

    /* --- 5. Border Sweep --- */
    .t-5.state-success .branch-tag { animation: border-sweep-green 0.5s ease-out; }
    .t-5.state-failure .branch-tag { animation: border-sweep-red 0.5s ease-out; }
    .t-5.state-merged .branch-tag { animation: border-sweep-purple 0.5s ease-out; }
    .t-5.state-skipped .branch-tag { animation: border-sweep-grey 0.5s ease-out; }
    @keyframes border-sweep-green {
      0% { border-color: var(--yellow); }
      50% { border-color: var(--green); border-width: 1.5px; }
      100% { border-color: var(--green); }
    }
    @keyframes border-sweep-red {
      0% { border-color: var(--yellow); }
      50% { border-color: var(--red); border-width: 1.5px; }
      100% { border-color: var(--red); }
    }
    @keyframes border-sweep-purple {
      0% { border-color: var(--yellow); }
      50% { border-color: var(--purple); border-width: 1.5px; }
      100% { border-color: var(--purple); }
    }
    @keyframes border-sweep-grey {
      0% { border-color: var(--yellow); }
      50% { border-color: var(--grey); border-width: 1.5px; }
      100% { border-color: var(--grey); }
    }

    /* --- 6. Icon Ripple Wave --- */
    .t-6.state-success .branch-icon { animation: icon-spin-burst 0.4s forwards; }
    .t-6.state-failure .branch-icon { animation: icon-spin-burst 0.4s forwards; }
    .t-6.state-merged .branch-icon { animation: icon-spin-burst 0.4s forwards; }
    .t-6.state-skipped .branch-icon { animation: icon-spin-burst 0.4s forwards; }
    @keyframes icon-spin-burst {
      0% { transform: scale(1) rotate(0deg); filter: brightness(1); }
      50% { transform: scale(1.4) rotate(180deg); filter: brightness(2); }
      100% { transform: scale(1) rotate(360deg); }
    }

    /* --- 7. Bounce Pop & Scale --- */
    .t-7.state-success .branch-tag, .t-7.state-failure .branch-tag,
    .t-7.state-merged .branch-tag, .t-7.state-skipped .branch-tag {
      animation: bounce-pop 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes bounce-pop {
      0% { transform: scale(1); }
      40% { transform: scale(0.85); }
      100% { transform: scale(1); }
    }

    /* --- 8. 3D Flip --- */
    .t-8.state-success .branch-tag, .t-8.state-failure .branch-tag,
    .t-8.state-merged .branch-tag, .t-8.state-skipped .branch-tag {
      animation: flip-3d 0.5s cubic-bezier(0.23, 1, 0.32, 1) forwards;
    }
    @keyframes flip-3d {
      0% { transform: rotateY(0deg); opacity: 1; }
      50% { transform: rotateY(90deg); opacity: 0.5; }
      100% { transform: rotateY(0deg); opacity: 1; }
    }

    /* --- 9. Sliding Scanline Sweep --- */
    .t-9 .branch-tag::after {
      content: '';
      position: absolute;
      top: 0; left: -100%; width: 50%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      transition: none;
    }
    .t-9.state-success .branch-tag::after, .t-9.state-failure .branch-tag::after,
    .t-9.state-merged .branch-tag::after, .t-9.state-skipped .branch-tag::after {
      animation: scanline-sweep 0.45s ease-out;
    }
    @keyframes scanline-sweep {
      0% { left: -100%; }
      100% { left: 200%; }
    }

    /* --- 10. Concentric Aura Dissolve --- */
    .t-10.state-success .branch-tag, .t-10.state-failure .branch-tag,
    .t-10.state-merged .branch-tag, .t-10.state-skipped .branch-tag {
      animation: aura-glow 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    @keyframes aura-glow {
      0% { box-shadow: 0 0 4px var(--yellow-glow), inset 0 0 0 rgba(255,255,255,0); }
      50% { box-shadow: 0 0 24px currentColor, inset 0 0 4px currentColor; }
      100% { box-shadow: 0 0 12px currentColor, inset 0 0 0 rgba(255,255,255,0); }
    }
  </style>
</head>
<body>

  <header>
    <h1>Branch Tag Status Transitions</h1>
    <p>10 CSS animation models showing the branch badge elastically transitioning color (grey, green, yellow, red, and purple) and glowing shadows in real-time.</p>
  </header>

  <div class="grid">
    
    <script>
      const titles = [
        "Glow Pulse Morph", "Elastic Width Snap", "Double Line Shutter", 
        "Holographic Glitch", "Border Sweep", "Icon Ripple Wave", 
        "Bounce Pop & Scale", "3D Shutter Flip", "Sliding Scanline Sweep", "Concentric Aura Dissolve"
      ];
      
      const descs = [
        "Tag background and glow elastically pulse and morph color on transition.",
        "A playful elastic horizontal squeeze and snap back into place.",
        "An expanding border overlay grows and vanishes elastically.",
        "High-tech digital chromatic glitch effect shifts tag color states.",
        "A neon border highlight sweeps the perimeter to update status color.",
        "A rotation spin burst starts at the icon and ripples across the text.",
        "Tag pops down in size elastically, updating color on rebound.",
        "Flipped 180 degrees elastically on Y-axis to reveal the completed status.",
        "A bright white glowing scanline sweeps left to right across the tag.",
        "A glowing aura expands outward and dissolves, leaving a soft background glow."
      ];

      for (let i = 1; i <= 10; i++) {
        document.write(`
          <div class="card t-${i} state-running">
            <span class="card-number">${String(i).padStart(2, '0')}</span>
            <div class="visualizer-box">
              <div class="branch-tag">
                <!-- Lucide GitBranch -->
                <svg class="branch-icon branch-icon-branch" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="3" x2="6" y2="15"></line><circle cx="18" cy="6" r="3"></circle><circle cx="6" cy="18" r="3"></circle><path d="M18 9a9 9 0 0 1-9 9"></path></svg>
                <!-- Lucide GitMerge -->
                <svg class="branch-icon branch-icon-merge" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="18" r="3"></circle><circle cx="6" cy="6" r="3"></circle><path d="M6 21V9a9 9 0 0 0 9 9"></path></svg>
                <span class="branch-name">feat/ci-activity</span>
              </div>
            </div>
            <div class="info">
              <h3 class="title">${titles[i-1]}</h3>
              <p class="desc">${descs[i-1]}</p>
            </div>
            <div class="controls">
              <button class="btn btn-running" onclick="triggerState(${i}, 'running')">Running</button>
              <button class="btn btn-success" onclick="triggerState(${i}, 'success')">Success</button>
              <button class="btn btn-failure" onclick="triggerState(${i}, 'failure')">Failure</button>
              <button class="btn btn-merged" onclick="triggerState(${i}, 'merged')">Merged</button>
              <button class="btn btn-skipped" onclick="triggerState(${i}, 'skipped')">Skipped</button>
            </div>
            <button class="code-btn" onclick="copyCode(${i})">Copy CSS Code</button>
          </div>
        `);
      }
    </script>

  </div>

  <script>
    const codeTemplates = {
      1: `/* Glow Pulse Morph */
.state-success .branch-tag { animation: pulse-green 0.5s ease-out; }
.state-failure .branch-tag { animation: pulse-red 0.5s ease-out; }
.state-merged .branch-tag { animation: pulse-purple 0.5s ease-out; }
.state-skipped .branch-tag { animation: pulse-grey 0.5s ease-out; }
@keyframes pulse-green {
  0% { box-shadow: 0 0 4px rgba(234, 179, 8, 0.25); }
  50% { box-shadow: 0 0 24px rgba(16, 185, 129, 0.25); transform: scale(1.05); }
  100% { box-shadow: 0 0 12px rgba(16, 185, 129, 0.25); }
}`,
      2: `/* Elastic Width Snap */
.state-success .branch-tag, .state-failure .branch-tag, 
.state-merged .branch-tag, .state-skipped .branch-tag {
  animation: elastic-snap 0.5s cubic-bezier(0.25, 1.5, 0.5, 1);
}
@keyframes elastic-snap {
  0% { transform: scaleX(0.7) scaleY(1); opacity: 0.8; }
  50% { transform: scaleX(1.1) scaleY(0.9); }
  100% { transform: scaleX(1) scaleY(1); opacity: 1; }
}`,
      3: `/* Double Line Shutter */
.branch-tag::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  border: 1px solid transparent; border-radius: 6px; transition: all 0.4s ease;
}
.state-success .branch-tag::before { border-color: #10b981; transform: scale(1.2); opacity: 0; }
.state-failure .branch-tag::before { border-color: #ef4444; transform: scale(1.2); opacity: 0; }`,
      4: `/* Holographic Glitch */
.state-success .branch-tag, .state-failure .branch-tag, .state-merged .branch-tag {
  animation: glitch-flash 0.35s forwards;
}
@keyframes glitch-flash {
  0% { opacity: 1; transform: skewX(-15deg); filter: hue-rotate(90deg); }
  30% { transform: skewX(15deg); filter: invert(0.2); }
  100% { opacity: 1; transform: skewX(0); }
}`,
      5: `/* Border Sweep */
.state-success .branch-tag { animation: border-sweep-green 0.5s ease-out; }
.state-failure .branch-tag { animation: border-sweep-red 0.5s ease-out; }
@keyframes border-sweep-green {
  0% { border-color: #eab308; }
  50% { border-color: #10b981; border-width: 1.5px; }
  100% { border-color: #10b981; }
}`,
      6: `/* Icon Ripple Wave */
.state-success .branch-icon, .state-failure .branch-icon, .state-merged .branch-icon {
  animation: icon-spin-burst 0.4s forwards;
}
@keyframes icon-spin-burst {
  0% { transform: scale(1) rotate(0deg); }
  50% { transform: scale(1.4) rotate(180deg); }
  100% { transform: scale(1) rotate(360deg); }
}`,
      7: `/* Bounce Pop & Scale */
.state-success .branch-tag, .state-failure .branch-tag, .state-merged .branch-tag {
  animation: bounce-pop 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
@keyframes bounce-pop {
  0% { transform: scale(1); }
  40% { transform: scale(0.85); }
  100% { transform: scale(1); }
}`,
      8: `/* 3D Flip */
.state-success .branch-tag, .state-failure .branch-tag, .state-merged .branch-tag {
  animation: flip-3d 0.5s cubic-bezier(0.23, 1, 0.32, 1) forwards;
}
@keyframes flip-3d {
  0% { transform: rotateY(0deg); }
  50% { transform: rotateY(90deg); opacity: 0.5; }
  100% { transform: rotateY(0deg); }
}`,
      9: `/* Sliding Scanline Sweep */
.branch-tag::after {
  content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
}
.state-success .branch-tag::after, .state-failure .branch-tag::after, .state-merged .branch-tag::after {
  animation: scanline-sweep 0.45s ease-out;
}
@keyframes scanline-sweep {
  0% { left: -100%; }
  100% { left: 200%; }
}`,
      10: `/* Concentric Aura Dissolve */
.state-success .branch-tag, .state-failure .branch-tag, .state-merged .branch-tag {
  animation: aura-glow 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
}
@keyframes aura-glow {
  0% { box-shadow: 0 0 4px rgba(234, 179, 8, 0.25); }
  50% { box-shadow: 0 0 24px currentColor, inset 0 0 4px currentColor; }
  100% { box-shadow: 0 0 12px currentColor; }
}`
    };

    function triggerState(id, state) {
      const card = document.querySelector(`.t-${id}`);
      card.className = `card t-${id} state-${state}`;
    }

    function copyCode(id) {
      const cssText = codeTemplates[id];
      navigator.clipboard.writeText(cssText).then(() => {
        const btn = document.querySelectorAll('.code-btn')[id - 1];
        const oldText = btn.textContent;
        btn.textContent = 'Copied to Clipboard!';
        btn.style.borderColor = '#10b981';
        btn.style.color = '#10b981';
        setTimeout(() => {
          btn.textContent = oldText;
          btn.style.borderColor = '';
          btn.style.color = '';
        }, 1500);
      });
    }
  </script>
</body>
</html>
