<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Icon VFX Concepts</title>
<style>
  :root {
    --bg-dark: #0f172a;
    --branch-color: #a855f7;
    --merge-color: #eab308;
    --pr-color: #ef4444;
  }
  
  body {
    background: #060b14;
    color: #fff;
    font-family: system-ui, -apple-system, sans-serif;
    margin: 0;
    padding: 40px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 40px;
  }

  .card {
    background: #111827;
    border: 1px solid #1f2937;
    border-radius: 12px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    box-shadow: 0 4px 6px rgba(0,0,0,0.3);
  }

  h2 { margin-top: 0; font-size: 16px; color: #94a3b8; }
  p { font-size: 13px; color: #64748b; margin-bottom: 20px; }

  /* Base Icon Styles */
  .app-mark-trio {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    width: 32px;
    height: 32px;
    cursor: pointer;
  }
  
  .app-mark-trio .attr {
    position: absolute;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 17px;
    height: 17px;
    border-radius: 0;
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    background: var(--bg-dark);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  .app-mark-trio .attr svg { width: 9px; height: 9px; stroke-width: 3; stroke: currentColor; fill: none; }
  
  .app-mark-trio .attr.branch { top: 0; left: 8px; z-index: 3; color: var(--branch-color); box-shadow: inset 0 0 10px var(--branch-color); }
  .app-mark-trio .attr.merge { bottom: 1px; left: 0; z-index: 2; color: var(--merge-color); box-shadow: inset 0 0 10px var(--merge-color); }
  .app-mark-trio .attr.pr { bottom: 1px; right: 0; z-index: 1; color: var(--pr-color); box-shadow: inset 0 0 10px var(--pr-color); }

  /* Concept 1: Pulse Spin */
  @keyframes pulse-spin {
    0% { transform: rotate(0deg) scale(1); filter: brightness(1) drop-shadow(0 0 0 transparent); }
    50% { transform: rotate(180deg) scale(1.3); filter: brightness(1.5) drop-shadow(0 0 15px rgba(255,255,255,0.4)); }
    100% { transform: rotate(360deg) scale(1); filter: brightness(1) drop-shadow(0 0 0 transparent); }
  }
  .concept-1.is-spinning { animation: pulse-spin 0.7s cubic-bezier(0.34, 1.56, 0.64, 1); }

  /* Concept 2: Glitch Spin */
  @keyframes glitch-spin {
    0% { transform: rotate(0deg); filter: drop-shadow(0 0 0 transparent); }
    20% { transform: rotate(72deg) translate(-2px, 2px); filter: drop-shadow(-4px 0 0 #0ff) drop-shadow(4px 0 0 #f0f); }
    40% { transform: rotate(144deg) translate(2px, -2px); filter: drop-shadow(-2px 0 0 #0ff) drop-shadow(2px 0 0 #f0f); }
    60% { transform: rotate(216deg) translate(-1px, -1px); filter: drop-shadow(4px 0 0 #0ff) drop-shadow(-4px 0 0 #f0f); }
    80% { transform: rotate(288deg) translate(2px, 1px); filter: drop-shadow(-2px 0 0 #0ff) drop-shadow(2px 0 0 #f0f); }
    100% { transform: rotate(360deg); filter: drop-shadow(0 0 0 transparent); }
  }
  .concept-2.is-spinning { animation: glitch-spin 0.6s steps(5); }

  /* Concept 3: Disassemble Spin */
  @keyframes disassemble-spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  @keyframes disassemble-branch { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(0, -10px) rotate(45deg); } }
  @keyframes disassemble-merge { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(-8px, 6px) rotate(-45deg); } }
  @keyframes disassemble-pr { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(8px, 6px) rotate(45deg); } }
  
  .concept-3.is-spinning { animation: disassemble-spin 0.8s ease-in-out; }
  .concept-3.is-spinning .branch { animation: disassemble-branch 0.8s ease-in-out; }
  .concept-3.is-spinning .merge { animation: disassemble-merge 0.8s ease-in-out; }
  .concept-3.is-spinning .pr { animation: disassemble-pr 0.8s ease-in-out; }

  /* Concept 4: Neon Trail */
  @keyframes neon-trail-spin {
    0% { transform: rotate(0deg); box-shadow: none; }
    50% { 
      transform: rotate(180deg); 
      filter: drop-shadow(0 0 8px var(--branch-color)) drop-shadow(0 0 8px var(--merge-color)) drop-shadow(0 0 8px var(--pr-color));
    }
    100% { transform: rotate(360deg); box-shadow: none; }
  }
  .concept-4.is-spinning { animation: neon-trail-spin 0.7s linear; }

  /* Concept 5: Blackhole */
  @keyframes blackhole-spin {
    0% { transform: rotate(0deg) scale(1); filter: brightness(1); }
    40% { transform: rotate(360deg) scale(0); filter: brightness(0); }
    60% { transform: rotate(540deg) scale(0); filter: brightness(0); }
    100% { transform: rotate(720deg) scale(1); filter: brightness(2); }
  }
  .concept-5.is-spinning { animation: blackhole-spin 1s cubic-bezier(0.5, 0, 0.5, 1); }

  /* Concept 6: 3D Coin Flip Spin */
  @keyframes flip-spin-3d {
    0% { transform: perspective(400px) rotateY(0deg) rotateZ(0deg); }
    50% { transform: perspective(400px) rotateY(180deg) rotateZ(180deg) scale(1.2); }
    100% { transform: perspective(400px) rotateY(360deg) rotateZ(360deg); }
  }
  .concept-6.is-spinning { animation: flip-spin-3d 0.8s ease-in-out; }

  /* Concept 7: Hyper-drive Warp */
  @keyframes warp-spin {
    0% { transform: rotate(0deg) scale(1, 1); }
    20% { transform: rotate(90deg) scale(0.5, 2); opacity: 0.5; }
    40% { transform: rotate(270deg) scale(2, 0.5); opacity: 0.8; }
    60% { transform: rotate(540deg) scale(0.2, 3); opacity: 0.4; }
    80% { transform: rotate(810deg) scale(1.5, 0.8); opacity: 0.9; }
    100% { transform: rotate(1080deg) scale(1, 1); opacity: 1; }
  }
  .concept-7.is-spinning { animation: warp-spin 0.7s cubic-bezier(0.1, 0.9, 0.2, 1); }

  /* Concept 8: Particle Burst Hack */
  @keyframes burst-spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  @keyframes burst-particles {
    0% { box-shadow: 0 0 0 0 transparent; opacity: 1; }
    50% { box-shadow: -20px -20px 0 2px var(--branch-color), 20px 20px 0 2px var(--merge-color), 20px -20px 0 2px var(--pr-color), -20px 20px 0 2px var(--branch-color); opacity: 1; }
    100% { box-shadow: -30px -30px 0 0 transparent, 30px 30px 0 0 transparent, 30px -30px 0 0 transparent, -30px 30px 0 0 transparent; opacity: 0; }
  }
  .concept-8.is-spinning { animation: burst-spin 0.6s linear; position: relative; }
  .concept-8.is-spinning::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    animation: burst-particles 0.6s ease-out;
    pointer-events: none;
  }

  /* Concept 9: Sonic Boom Ripple */
  @keyframes sonic-boom-spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(720deg); }
  }
  @keyframes sonic-boom-ripple {
    0% { transform: scale(1); opacity: 0.8; border: 2px solid #38bdf8; }
    100% { transform: scale(3); opacity: 0; border: 2px solid #38bdf8; }
  }
  .concept-9 { position: relative; }
  .concept-9.is-spinning { animation: sonic-boom-spin 0.8s ease-in-out; }
  .concept-9.is-spinning::before, .concept-9.is-spinning::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    opacity: 0;
  }
  .concept-9.is-spinning::before { animation: sonic-boom-ripple 0.6s ease-out; }
  .concept-9.is-spinning::after { animation: sonic-boom-ripple 0.6s ease-out 0.2s; }

  /* Concept 10: Spring Bounce Spin */
  @keyframes spring-bounce-spin {
    0% { transform: rotate(0deg) scale(1); }
    20% { transform: rotate(-45deg) scale(0.7); }
    50% { transform: rotate(400deg) scale(1.4); }
    75% { transform: rotate(340deg) scale(0.9); }
    100% { transform: rotate(360deg) scale(1); }
  }
  .concept-10.is-spinning { animation: spring-bounce-spin 0.9s cubic-bezier(0.28, 0.84, 0.42, 1); }

</style>
</head>
<body>

<script>
  function triggerAnimation(el) {
    if (el.classList.contains('is-spinning')) return;
    el.classList.add('is-spinning');
    el.addEventListener('animationend', function handler(e) {
      if (e.target === el) {
        el.classList.remove('is-spinning');
        el.removeEventListener('animationend', handler);
      }
    });
  }
</script>

<!-- Generator function for the HTML -->
<script>
  const concepts = [
    { id: 1, name: "Pulse Spin", desc: "Spins, scales up, and glows intensely." },
    { id: 2, name: "Glitch Spin", desc: "Cyberpunk RGB glitch effect during rotation." },
    { id: 3, name: "Disassemble", desc: "The three parts fly outwards and reassemble." },
    { id: 4, name: "Neon Trail", desc: "Leaves a bright colorful blur trail." },
    { id: 5, name: "Blackhole", desc: "Sucks inwards, disappears, and explodes out." },
    { id: 6, name: "3D Coin Flip", desc: "Flips through 3D perspective while spinning." },
    { id: 7, name: "Hyper-drive Warp", desc: "Stretches and squashes rapidly." },
    { id: 8, name: "Particle Burst", desc: "Emits a burst of colorful particles." },
    { id: 9, name: "Sonic Boom", desc: "Double shockwave ripple effect." },
    { id: 10, name: "Spring Bounce", desc: "Winds back, overshoots, and snaps into place." }
  ];

  const svgBranch = `<svg xmlns="http://www.w3.org/2000/svg" width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="3" x2="6" y2="15"></line><circle cx="18" cy="6" r="3"></circle><circle cx="6" cy="18" r="3"></circle><path d="M18 9a9 9 0 0 1-9 9"></path></svg>`;
  const svgMerge = `<svg xmlns="http://www.w3.org/2000/svg" width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="18" r="3"></circle><circle cx="6" cy="6" r="3"></circle><path d="M6 21V9a9 9 0 0 0 9 9"></path></svg>`;
  const svgPr = `<svg xmlns="http://www.w3.org/2000/svg" width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="18" r="3"></circle><circle cx="6" cy="6" r="3"></circle><path d="M13 6h3a2 2 0 0 1 2 2v7"></path><line x1="6" y1="9" x2="6" y2="21"></line></svg>`;

  concepts.forEach(c => {
    document.write(`
      <div class="card" onclick="triggerAnimation(this.querySelector('.app-mark-trio'))">
        <h2>${c.id}. ${c.name}</h2>
        <p>${c.desc}</p>
        <div class="app-mark-trio concept-${c.id}">
          <div class="attr branch">${svgBranch}</div>
          <div class="attr merge">${svgMerge}</div>
          <div class="attr pr">${svgPr}</div>
        </div>
      </div>
    `);
  });
</script>

</body>
</html>
