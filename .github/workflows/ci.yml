name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '24'

jobs:
  frontend-quality:
    name: Frontend Quality
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

  rust-quality:
    name: Rust Quality
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential curl file libayatana-appindicator3-dev libssl-dev \
            librsvg2-dev libwebkit2gtk-4.1-dev libxdo-dev patchelf wget
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: ci-rust-${{ runner.os }}-x86_64-${{ hashFiles('src-tauri/Cargo.lock') }}
      - run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features
      - run: cargo test --manifest-path src-tauri/Cargo.toml --all-features

  playwright-e2e:
    name: Playwright E2E
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-failure-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            playwright-report/
            test-results/
            screenshots/
          if-no-files-found: ignore
          retention-days: 10

  windows-tauri-build:
    name: Windows Tauri Build
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: ci-rust-${{ runner.os }}-x86_64-${{ hashFiles('src-tauri/Cargo.lock') }}
      - run: pnpm tauri build --bundles nsis
