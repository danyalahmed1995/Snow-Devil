<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snow Devil</title>
    <style>
      body, html {
        background-color: #040912; /* Prevents white flash before globals.css loads */
      }
      #splash-wrapper {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #040912;
        z-index: 99999;
      }
      #splash-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 32px;
        animation: fade-in 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        position: relative;
        width: 100%;
        height: 100%;
      }
      #splash-container::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 300px;
        background: linear-gradient(135deg, rgba(0, 191, 255, 0.15), rgba(214, 168, 75, 0.05));
        z-index: 0;
        mask-image: linear-gradient(to bottom, black, transparent);
        -webkit-mask-image: linear-gradient(to bottom, black, transparent);
        pointer-events: none;
      }
      .splash-icon-wrapper {
        width: 96px;
        height: 96px;
        border-radius: 28px;
        background: rgba(6, 17, 33, 0.8);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 16px 32px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(195, 230, 255, 0.12);
        animation: splash-spin 2s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
        z-index: 1;
      }
      .splash-icon-wrapper img {
        width: 56px;
        height: 56px;
        object-fit: contain;
      }
      #splash-text {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 1.4rem;
        font-weight: 600;
        color: #f1f6ff;
        display: flex;
        align-items: center;
        z-index: 1;
        letter-spacing: 0.02em;
      }
      .loading-dots {
        display: inline-block;
        width: 28px;
        text-align: left;
      }
      @keyframes dot-blink {
        0%, 20% { content: "."; }
        40% { content: ".."; }
        60%, 100% { content: "..."; }
      }
      .loading-dots::after {
        content: ".";
        animation: dot-blink 1.5s infinite steps(1, end);
      }
      @keyframes splash-spin {
        0% { 
          transform: rotate(0deg) scale(1); 
          box-shadow: 0 16px 32px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05), 0 0 0 0 rgba(0, 191, 255, 0.2);
        }
        50% { 
          transform: rotate(180deg) scale(1.15); 
          box-shadow: 0 24px 48px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.05), 0 0 24px 4px rgba(0, 191, 255, 0.4);
          border-color: rgba(0, 191, 255, 0.4);
        }
        100% { 
          transform: rotate(360deg) scale(1); 
          box-shadow: 0 16px 32px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05), 0 0 0 0 rgba(0, 191, 255, 0.2);
        }
      }
      @keyframes fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div id="splash-wrapper">
        <div id="splash-container">
          <div class="splash-icon-wrapper">
            <img src="/icon.svg" alt="Snow Devil" />
          </div>
          <div id="splash-text">Loading<span class="loading-dots"></span></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
